# =============================================================================
# psmux-pain-control - Better pane navigation and management for psmux
# Static .conf version (source-file compatible)
# =============================================================================
# Default @pane_resize = 5

# --- Pane navigation (vim-style: h/j/k/l) ---
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# --- Pane resizing (Alt + vim keys, repeatable) ---
# Uses Alt modifiers to avoid case-insensitivity conflicts
bind-key -r M-h resize-pane -L 5
bind-key -r M-j resize-pane -D 5
bind-key -r M-k resize-pane -U 5
bind-key -r M-l resize-pane -R 5

# --- Pane splitting (intuitive chars, preserves working directory) ---
# | and \ for horizontal split (side by side)
bind-key '|' split-window -h -c '#{pane_current_path}'
bind-key '\' split-window -h -c '#{pane_current_path}'

# - and _ for vertical split (top/bottom)
bind-key '-' split-window -v -c '#{pane_current_path}'
bind-key '_' split-window -v -c '#{pane_current_path}'

# --- Window navigation ---
# < and > to swap windows left/right (repeatable)
bind-key -r '<' swap-window -t -1
bind-key -r '>' swap-window -t +1

# --- New windows in current directory ---
bind-key c new-window -c '#{pane_current_path}'
