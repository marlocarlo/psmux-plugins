# =============================================================================
# psmux-theme-dracula - Dracula
# Style: Right-Cap Neon
# Active tab: trailing arrow only. Inactive: pipe-separated flat text.
# =============================================================================
#
# Palette:
#   bg=#282a36 curLine=#44475a fg=#f8f8f2 comment=#6272a4
#   cyan=#8be9fd green=#50fa7b orange=#ffb86c pink=#ff79c6
#   purple=#bd93f9 red=#ff5555 yellow=#f1fa8c

set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#282a36,fg=#f8f8f2"

set -g status-left "#[bg=#50fa7b,fg=#282a36,bold] #S #[fg=#50fa7b,bg=#44475a]#[fg=#f8f8f2] #{user} #[fg=#44475a,bg=#282a36] "
set -g status-left-length 50

set -g status-right "#{?client_prefix,#[bg=#ff79c6,fg=#282a36,bold] PREF #[fg=#ff79c6,bg=#282a36] ,}#[fg=#44475a,bg=#282a36]#[bg=#44475a,fg=#8be9fd] %H:%M #[fg=#6272a4,bg=#44475a]#[bg=#6272a4,fg=#ffb86c] %a #[fg=#bd93f9,bg=#6272a4]#[bg=#bd93f9,fg=#f8f8f2,bold] %d-%b "
set -g status-right-length 80

# Inactive: pipe-separated flat text
set -g window-status-format "#[fg=#6272a4] #I #W#{?window_flags, #{window_flags},} "
set -g window-status-separator "#[fg=#44475a]|"

# Active: right-cap only (NO leading arrow, trailing arrow)
set -g window-status-current-format "#[bg=#bd93f9,fg=#f8f8f2,bold] #I #W#{?window_flags, #{window_flags},} #[fg=#bd93f9,bg=#282a36]"

set -g window-status-activity-style "fg=#ffb86c,bg=#282a36"
set -g pane-active-border-style "fg=#bd93f9"
set -g pane-border-style "fg=#44475a"
set -g message-style "bg=#44475a,fg=#f8f8f2"
set -g message-command-style "bg=#44475a,fg=#f8f8f2"
set -g mode-style "bg=#bd93f9,fg=#f8f8f2"