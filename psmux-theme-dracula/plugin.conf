# =============================================================================
# psmux-theme-dracula - Dracula color theme for psmux
# Static .conf version (source-file compatible)
# Powerline: on, Left icon: session, Flags: on
# =============================================================================
#
# Dracula palette:
#   bg=#282a36 curLine=#44475a fg=#f8f8f2 comment=#6272a4
#   cyan=#8be9fd green=#50fa7b orange=#ffb86c pink=#ff79c6
#   purple=#bd93f9 red=#ff5555 yellow=#f1fa8c

# --- Status bar ---
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#282a36,fg=#f8f8f2"

# Status left: session name on green
set -g status-left "#[bg=#50fa7b,fg=#282a36,bold] #S #[fg=#50fa7b,bg=#282a36] "
set -g status-left-length 30

# Status right: prefix indicator + time + date
set -g status-right "#{?client_prefix,#[fg=#f1fa8c]#[bg=#282a36]#[bg=#f1fa8c]#[fg=#282a36] WAIT #[fg=#f1fa8c]#[bg=#282a36],}#[fg=#44475a,bg=#282a36]#[fg=#f8f8f2,bg=#44475a] %H:%M #[fg=#bd93f9,bg=#44475a]#[fg=#282a36,bg=#bd93f9,bold] %d-%b-%y "
set -g status-right-length 60

# Window status (inactive)
set -g window-status-format "#[fg=#282a36,bg=#44475a]#[fg=#f8f8f2,bg=#44475a] #I:#W#{?window_flags,#{window_flags}, } #[fg=#44475a,bg=#282a36]"

# Window status (current/active) - purple highlight
set -g window-status-current-format "#[fg=#282a36,bg=#bd93f9]#[fg=#f8f8f2,bg=#bd93f9,bold] #I:#W#{?window_flags,#{window_flags}, } #[fg=#bd93f9,bg=#282a36]"

# Activity
set -g window-status-activity-style "fg=#ffb86c,bg=#282a36"

# Pane borders
set -g pane-active-border-style "fg=#bd93f9"

# Messages
set -g message-style "bg=#44475a,fg=#f8f8f2"
set -g message-command-style "bg=#44475a,fg=#f8f8f2"

# Copy mode
set -g mode-style "bg=#bd93f9,fg=#f8f8f2"
