# =============================================================================
# psmux-theme-dracula - Dracula color theme for psmux
# Static .conf version (source-file compatible)
# Style: clean blocks (standard Unicode, no special fonts required)
# =============================================================================
#
# Dracula palette:
#   bg=#282a36 curLine=#44475a fg=#f8f8f2 comment=#6272a4
#   cyan=#8be9fd green=#50fa7b orange=#ffb86c pink=#ff79c6
#   purple=#bd93f9 red=#ff5555 yellow=#f1fa8c

# --- Status bar ---
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#282a36,fg=#f8f8f2"

# Status left: session name + user segment
set -g status-left "#[bg=#50fa7b,fg=#282a36,bold] #S #[bg=#44475a,fg=#f8f8f2] #{user} #[bg=#282a36,fg=#f8f8f2] "
set -g status-left-length 45

# Status right: prefix indicator + time + day + date
set -g status-right "#{?client_prefix,#[bg=#f1fa8c,fg=#282a36,bold] PREF #[bg=#282a36] ,}#[bg=#44475a,fg=#8be9fd] %H:%M #[bg=#6272a4,fg=#ffb86c] %a #[bg=#bd93f9,fg=#f8f8f2,bold] %d-%b "
set -g status-right-length 80

# Window status (inactive)
set -g window-status-format "#[bg=#44475a,fg=#f8f8f2] #I #W#{?window_flags, #{window_flags},} "

# Window status (current/active) - purple highlight
set -g window-status-current-format "#[bg=#bd93f9,fg=#f8f8f2,bold] #I #W#{?window_flags, #{window_flags},} "

# Activity
set -g window-status-activity-style "fg=#ffb86c,bg=#282a36"

# Pane borders
set -g pane-active-border-style "fg=#bd93f9"
set -g pane-border-style "fg=#44475a"

# Messages
set -g message-style "bg=#44475a,fg=#f8f8f2"
set -g message-command-style "bg=#44475a,fg=#f8f8f2"

# Copy mode
set -g mode-style "bg=#bd93f9,fg=#f8f8f2"