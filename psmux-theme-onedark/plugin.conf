# =============================================================================
# psmux-theme-onedark - One Dark
# Style: IDE Tabs
# Active tab: raised bg block, no arrows (IDE/browser style). Inactive: dimmer blocks.
# =============================================================================
#
# Palette:
#   bg=#282c34 bg_light=#2c313a bg_lighter=#3e4452
#   fg=#abb2bf comment=#5c6370 gutter=#4b5263
#   red=#e06c75 green=#98c379 yellow=#e5c07b
#   blue=#61afef magenta=#c678dd cyan=#56b6c2

set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#282c34,fg=#abb2bf"

set -g status-left "#[bg=#61afef,fg=#282c34,bold] #S #[fg=#61afef,bg=#2c313a]▌#[fg=#abb2bf] #{user} #[fg=#2c313a,bg=#282c34]▌ "
set -g status-left-length 50

set -g status-right "#{?client_prefix,#[bg=#e06c75,fg=#282c34,bold] PREF #[fg=#e06c75,bg=#282c34]▌ ,}#[fg=#3e4452,bg=#282c34]▐#[bg=#3e4452,fg=#56b6c2] %H:%M #[fg=#4b5263,bg=#3e4452]▐#[bg=#4b5263,fg=#e5c07b] %a #[fg=#61afef,bg=#4b5263]▐#[bg=#61afef,fg=#282c34,bold] %d-%b "
set -g status-right-length 80

# Inactive: subtle bg blocks (unfocused IDE tabs)
set -g window-status-format "#[bg=#282c34] #[bg=#2c313a,fg=#5c6370] #I #W#{?window_flags, #{window_flags},} "
set -g window-status-separator ""

# Active: raised bg block, bright green text, NO arrows (IDE tab)
set -g window-status-current-format "#[bg=#282c34] #[bg=#3e4452,fg=#98c379,bold] #I #W#{?window_flags, #{window_flags},} "

set -g window-status-activity-style "fg=#d19a66,bg=#282c34"
set -g pane-active-border-style "fg=#61afef"
set -g pane-border-style "fg=#3e4452"
set -g message-style "bg=#2c313a,fg=#abb2bf"
set -g message-command-style "bg=#2c313a,fg=#abb2bf"
set -g mode-style "bg=#61afef,fg=#282c34"