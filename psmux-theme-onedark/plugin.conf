# =============================================================================
# psmux-theme-onedark - One Dark color theme for psmux
# Static .conf version (source-file compatible)
# Style: clean blocks (standard Unicode, no special fonts required)
# =============================================================================
#
# One Dark palette (Atom-inspired):
#   bg=#282c34 bg_light=#2c313a bg_lighter=#3e4452
#   fg=#abb2bf comment=#5c6370 gutter=#4b5263
#   red=#e06c75 dark_red=#be5046 green=#98c379
#   yellow=#e5c07b dark_yellow=#d19a66 blue=#61afef
#   magenta=#c678dd cyan=#56b6c2 white=#abb2bf

# --- Status bar ---
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#282c34,fg=#abb2bf"

# Status left: session name + user segment
set -g status-left "#[bg=#61afef,fg=#282c34,bold] #S #[bg=#2c313a,fg=#abb2bf] #{user} #[bg=#282c34,fg=#abb2bf] "
set -g status-left-length 45

# Status right: prefix indicator + time + day + date
set -g status-right "#{?client_prefix,#[bg=#e06c75,fg=#282c34,bold] PREF #[bg=#282c34] ,}#[bg=#3e4452,fg=#56b6c2] %H:%M #[bg=#4b5263,fg=#e5c07b] %a #[bg=#61afef,fg=#282c34,bold] %d-%b "
set -g status-right-length 80

# Window status (inactive)
set -g window-status-format "#[bg=#2c313a,fg=#5c6370] #I #W#{?window_flags, #{window_flags},} "

# Window status (current/active) - green highlight
set -g window-status-current-format "#[bg=#98c379,fg=#282c34,bold] #I #W#{?window_flags, #{window_flags},} "

# Activity
set -g window-status-activity-style "fg=#d19a66,bg=#282c34"

# Pane borders
set -g pane-active-border-style "fg=#61afef"
set -g pane-border-style "fg=#3e4452"

# Messages
set -g message-style "bg=#2c313a,fg=#abb2bf"
set -g message-command-style "bg=#2c313a,fg=#abb2bf"

# Copy mode
set -g mode-style "bg=#61afef,fg=#282c34"