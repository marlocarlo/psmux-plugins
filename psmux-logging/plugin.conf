# =============================================================================
# psmux-logging - Log pane output to files
# Static .conf version (source-file compatible)
# =============================================================================
# Key bindings:
#   Prefix + Alt-o  - Toggle logging for current pane
#   Prefix + Alt-p  - Save visible pane content (screenshot)
#   Prefix + Alt-i  - Save complete pane history
#   Prefix + Alt-c  - Clear pane history

# Toggle logging on/off
bind-key M-o run-shell 'pwsh -NoProfile -File "~/.psmux/plugins/psmux-logging/scripts/toggle_logging.ps1"'

# Capture visible pane content to file
bind-key M-p run-shell 'pwsh -NoProfile -File "~/.psmux/plugins/psmux-logging/scripts/capture_screen.ps1"'

# Capture complete pane history to file
bind-key M-i run-shell 'pwsh -NoProfile -File "~/.psmux/plugins/psmux-logging/scripts/capture_history.ps1"'

# Clear pane history
bind-key M-c clear-history
