# =============================================================================
# psmux-theme-rosepine - Rose Pine color theme for psmux
# Static .conf version (source-file compatible)
# Style: clean blocks (standard Unicode, no special fonts required)
# Variant: main
# =============================================================================
#
# Rose Pine palette (main):
#   base=#191724 surface=#1f1d2e overlay=#26233a
#   muted=#6e6a86 subtle=#908caa text=#e0def4
#   love=#eb6f92 gold=#f6c177 rose=#ebbcba
#   pine=#31748f foam=#9ccfd8 iris=#c4a7e7
#   highlight_low=#21202e highlight_med=#403d52 highlight_high=#524f67

# --- Status bar ---
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#191724,fg=#e0def4"

# Status left: session name + user segment
set -g status-left "#[bg=#c4a7e7,fg=#191724,bold] #S #[bg=#26233a,fg=#908caa] #{user} #[bg=#191724,fg=#e0def4] "
set -g status-left-length 45

# Status right: prefix indicator + time + day + date
set -g status-right "#{?client_prefix,#[bg=#eb6f92,fg=#191724,bold] PREF #[bg=#191724] ,}#[bg=#26233a,fg=#9ccfd8] %H:%M #[bg=#403d52,fg=#f6c177] %a #[bg=#31748f,fg=#e0def4,bold] %d-%b "
set -g status-right-length 80

# Window status (inactive)
set -g window-status-format "#[bg=#26233a,fg=#6e6a86] #I #W#{?window_flags, #{window_flags},} "

# Window status (current/active) - rose highlight
set -g window-status-current-format "#[bg=#ebbcba,fg=#191724,bold] #I #W#{?window_flags, #{window_flags},} "

# Activity
set -g window-status-activity-style "fg=#f6c177,bg=#191724"

# Pane borders
set -g pane-active-border-style "fg=#c4a7e7"
set -g pane-border-style "fg=#26233a"

# Messages
set -g message-style "bg=#26233a,fg=#e0def4"
set -g message-command-style "bg=#26233a,fg=#e0def4"

# Copy mode
set -g mode-style "bg=#c4a7e7,fg=#191724"