# =============================================================================
# psmux-theme-tokyonight - Tokyo Night color theme for psmux
# Static .conf version (source-file compatible)
# Style: clean blocks (standard Unicode, no special fonts required)
# Variant: night
# =============================================================================
#
# Tokyo Night palette:
#   bg=#1a1b26 bg_dark=#16161e bg_hl=#292e42
#   fg=#c0caf5 fg_dark=#a9b1d6 comment=#565f89
#   blue=#7aa2f7 cyan=#7dcfff green=#9ece6a
#   magenta=#bb9af7 red=#f7768e yellow=#e0af68
#   orange=#ff9e64 teal=#1abc9c

# --- Status bar ---
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#1a1b26,fg=#c0caf5"

# Status left: session name + user segment
set -g status-left "#[bg=#7aa2f7,fg=#16161e,bold] #S #[bg=#292e42,fg=#a9b1d6] #{user} #[bg=#1a1b26,fg=#c0caf5] "
set -g status-left-length 45

# Status right: prefix indicator + time + day + date
set -g status-right "#{?client_prefix,#[bg=#ff9e64,fg=#16161e,bold] PREF #[bg=#1a1b26] ,}#[bg=#292e42,fg=#7dcfff] %H:%M #[bg=#545c7e,fg=#bb9af7] %a #[bg=#7aa2f7,fg=#16161e,bold] %d-%b "
set -g status-right-length 80

# Window status (inactive)
set -g window-status-format "#[bg=#292e42,fg=#565f89] #I #W#{?window_flags, #{window_flags},} "

# Window status (current/active) - green highlight
set -g window-status-current-format "#[bg=#9ece6a,fg=#16161e,bold] #I #W#{?window_flags, #{window_flags},} "

# Activity
set -g window-status-activity-style "fg=#e0af68,bg=#1a1b26"

# Pane borders
set -g pane-active-border-style "fg=#7aa2f7"
set -g pane-border-style "fg=#292e42"

# Messages
set -g message-style "bg=#292e42,fg=#c0caf5"
set -g message-command-style "bg=#292e42,fg=#c0caf5"

# Copy mode
set -g mode-style "bg=#7aa2f7,fg=#16161e"