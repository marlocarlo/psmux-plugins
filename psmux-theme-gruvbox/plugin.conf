# =============================================================================
# psmux-theme-gruvbox - Gruvbox color theme for psmux
# Static .conf version (source-file compatible)
# Style: clean blocks (standard Unicode, no special fonts required)
# Variant: dark, Contrast: medium
# =============================================================================
#
# Gruvbox dark/medium palette:
#   bg=#282828 bg1=#3c3836 bg2=#504945 bg3=#665c54 bg4=#7c6f64
#   fg=#ebdbb2 fg1=#fbf1c7
#   red=#fb4934 green=#b8bb26 yellow=#fabd2f blue=#83a598
#   purple=#d3869b aqua=#8ec07c orange=#fe8019 gray=#928374

# --- Status bar ---
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#282828,fg=#ebdbb2"

# Status left: session name + user segment
set -g status-left "#[bg=#fabd2f,fg=#282828,bold] #S #[bg=#3c3836,fg=#d5c4a1] #{user} #[bg=#282828,fg=#ebdbb2] "
set -g status-left-length 45

# Status right: prefix indicator + time + day + date
set -g status-right "#{?client_prefix,#[bg=#fe8019,fg=#282828,bold] PREF #[bg=#282828] ,}#[bg=#504945,fg=#8ec07c] %H:%M #[bg=#665c54,fg=#83a598] %a #[bg=#fabd2f,fg=#282828,bold] %d-%b "
set -g status-right-length 80

# Window status (inactive)
set -g window-status-format "#[bg=#3c3836,fg=#928374] #I #W#{?window_flags, #{window_flags},} "

# Window status (current/active) - green highlight
set -g window-status-current-format "#[bg=#b8bb26,fg=#282828,bold] #I #W#{?window_flags, #{window_flags},} "

# Activity
set -g window-status-activity-style "fg=#fe8019,bg=#3c3836"

# Pane borders
set -g pane-active-border-style "fg=#8ec07c"
set -g pane-border-style "fg=#3c3836"

# Messages
set -g message-style "bg=#504945,fg=#ebdbb2"
set -g message-command-style "bg=#504945,fg=#ebdbb2"

# Copy mode
set -g mode-style "bg=#fabd2f,fg=#282828"