# =============================================================================
# psmux-theme-gruvbox - Gruvbox color theme for psmux
# Static .conf version (source-file compatible)
# Variant: dark, Contrast: medium, Powerline: on
# =============================================================================
#
# Gruvbox dark/medium palette:
#   bg=#282828 bg1=#3c3836 bg2=#504945 bg3=#665c54 bg4=#7c6f64
#   fg=#ebdbb2 fg1=#fbf1c7
#   red=#fb4934 green=#b8bb26 yellow=#fabd2f blue=#83a598
#   purple=#d3869b aqua=#8ec07c orange=#fe8019 gray=#928374

# --- Status bar ---
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#3c3836,fg=#ebdbb2"

# Status left: session name on yellow
set -g status-left "#[bg=#fabd2f,fg=#282828,bold] #S #[fg=#fabd2f,bg=#3c3836] "
set -g status-left-length 25

# Status right: prefix indicator + time + date
set -g status-right "#{?client_prefix,#[fg=#fe8019]#[bg=#3c3836]#[bg=#fe8019]#[fg=#282828] WAIT #[fg=#fe8019]#[bg=#3c3836],}#[fg=#504945,bg=#3c3836]#[fg=#ebdbb2,bg=#504945] %H:%M #[fg=#8ec07c,bg=#504945]#[fg=#282828,bg=#8ec07c,bold] %d-%b "
set -g status-right-length 60

# Window status (inactive)
set -g window-status-format "#[fg=#504945,bg=#3c3836]#[fg=#ebdbb2,bg=#504945] #I:#W #{?window_flags,#{window_flags},}#[fg=#504945,bg=#3c3836]"

# Window status (current/active) - green highlight
set -g window-status-current-format "#[fg=#b8bb26,bg=#3c3836]#[fg=#282828,bg=#b8bb26,bold] #I:#W #{?window_flags,#{window_flags},}#[fg=#b8bb26,bg=#3c3836]"

# Activity
set -g window-status-activity-style "fg=#fe8019,bg=#3c3836"

# Pane borders
set -g pane-active-border-style "fg=#8ec07c"

# Messages
set -g message-style "bg=#504945,fg=#ebdbb2"
set -g message-command-style "bg=#504945,fg=#ebdbb2"

# Copy mode
set -g mode-style "bg=#fabd2f,fg=#282828"
