# =============================================================================
# psmux-sidebar - Directory tree sidebar for psmux
# Static .conf version (source-file compatible)
# =============================================================================
# Key bindings:
#   Prefix + Tab   - Toggle sidebar (focus stays on original pane)
#   Prefix + BTab  - Toggle sidebar (focus moves to sidebar)

# Toggle sidebar
bind-key Tab run-shell 'pwsh -NoProfile -File "~/.psmux/plugins/psmux-sidebar/scripts/toggle_sidebar.ps1"'

# Toggle sidebar with focus
bind-key BTab run-shell 'pwsh -NoProfile -File "~/.psmux/plugins/psmux-sidebar/scripts/toggle_sidebar.ps1" -FocusSidebar'
