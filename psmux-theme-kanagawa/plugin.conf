# =============================================================================
# psmux-theme-kanagawa - Kanagawa Wave
# Style: Underline Accent
# Active tab: bold text + underline, no bg, no arrows. Inactive: minimal.
# =============================================================================
#
# Palette:
#   bg=#1f1f28 bg_light=#2a2a37
#   fg=#dcd7ba fg_dark=#c8c093 comment=#727169
#   wave_blue1=#223249 wave_blue2=#2d4f67
#   crystal=#7e9cd8 spring=#98bb6c
#   autumn=#dca561 samurai=#e82424

set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#1f1f28,fg=#dcd7ba"

# Zen: session only
set -g status-left "#[bg=#7e9cd8,fg=#1f1f28,bold] #S #[fg=#7e9cd8,bg=#1f1f28] "
set -g status-left-length 30

# Minimal: 2 segments
set -g status-right "#{?client_prefix,#[bg=#e82424,fg=#dcd7ba,bold] PREF #[fg=#e82424,bg=#1f1f28] ,}#[fg=#2a2a37,bg=#1f1f28]#[bg=#2a2a37,fg=#98bb6c] %H:%M #[fg=#7e9cd8,bg=#2a2a37]#[bg=#7e9cd8,fg=#1f1f28,bold] %d-%b "
set -g status-right-length 50

# Inactive: minimal calm text
set -g window-status-format "#[fg=#727169]  #I #W#{?window_flags, #{window_flags},}  "
set -g window-status-separator ""

# Active: spring green bold + underline, NO bg, NO arrows
set -g window-status-current-format "#[fg=#98bb6c,bold,underscore]  #I #W#{?window_flags, #{window_flags},}  #[nounderscore]"

set -g window-status-activity-style "fg=#ffa066,bg=#1f1f28"
set -g pane-active-border-style "fg=#7e9cd8"
set -g pane-border-style "fg=#223249"
set -g message-style "bg=#223249,fg=#dcd7ba"
set -g message-command-style "bg=#223249,fg=#dcd7ba"
set -g mode-style "bg=#2d4f67,fg=#dcd7ba"