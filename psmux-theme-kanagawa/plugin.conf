# =============================================================================
# psmux-theme-kanagawa - Kanagawa color theme for psmux
# Static .conf version (source-file compatible)
# Style: clean blocks (standard Unicode, no special fonts required)
# Variant: wave
# =============================================================================
#
# Kanagawa Wave palette:
#   bg=#1f1f28 bg_dark=#16161d bg_light=#2a2a37
#   fg=#dcd7ba fg_dark=#c8c093 fg_comment=#727169
#   wave_blue1=#223249 wave_blue2=#2d4f67
#   crystal_blue=#7e9cd8 spring_green=#98bb6c
#   autumn_yellow=#dca561 samurai_red=#e82424
#   surimi_orange=#ffa066

# --- Status bar ---
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#1f1f28,fg=#dcd7ba"

# Status left: session name + user segment
set -g status-left "#[bg=#7e9cd8,fg=#1f1f28,bold] #S #[bg=#223249,fg=#c8c093] #{user} #[bg=#1f1f28,fg=#dcd7ba] "
set -g status-left-length 45

# Status right: prefix indicator + time + day + date
set -g status-right "#{?client_prefix,#[bg=#e82424,fg=#1f1f28,bold] PREF #[bg=#1f1f28] ,}#[bg=#2a2a37,fg=#98bb6c] %H:%M #[bg=#2d4f67,fg=#dca561] %a #[bg=#7e9cd8,fg=#1f1f28,bold] %d-%b "
set -g status-right-length 80

# Window status (inactive)
set -g window-status-format "#[bg=#223249,fg=#727169] #I #W#{?window_flags, #{window_flags},} "

# Window status (current/active) - spring green highlight
set -g window-status-current-format "#[bg=#98bb6c,fg=#1f1f28,bold] #I #W#{?window_flags, #{window_flags},} "

# Activity
set -g window-status-activity-style "fg=#ffa066,bg=#1f1f28"

# Pane borders
set -g pane-active-border-style "fg=#7e9cd8"
set -g pane-border-style "fg=#223249"

# Messages
set -g message-style "bg=#223249,fg=#dcd7ba"
set -g message-command-style "bg=#223249,fg=#dcd7ba"

# Copy mode
set -g mode-style "bg=#2d4f67,fg=#dcd7ba"