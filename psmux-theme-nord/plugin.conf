# =============================================================================
# psmux-theme-nord - Nord
# Style: Left-Cap Arctic
# Active tab: leading arrow only, flat right edge. Inactive: spacious text.
# =============================================================================
#
# Palette:
#   nord0=#2e3440 nord1=#3b4252 nord2=#434c5e nord3=#4c566a
#   nord4=#d8dee9 nord6=#eceff4
#   frost: nord7=#8fbcbb nord8=#88c0d0 nord9=#81a1c1 nord10=#5e81ac
#   aurora: nord13=#ebcb8b nord14=#a3be8c

set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#3b4252,fg=#d8dee9"

# Minimal: session only
set -g status-left "#[bg=#81a1c1,fg=#2e3440,bold] #S #[fg=#81a1c1,bg=#3b4252]▌ "
set -g status-left-length 30

# Compact: 2 segments
set -g status-right "#{?client_prefix,#[bg=#ebcb8b,fg=#2e3440,bold] PREF #[fg=#ebcb8b,bg=#3b4252]▌ ,}#[fg=#434c5e,bg=#3b4252]▐#[bg=#434c5e,fg=#8fbcbb] %H:%M #[fg=#5e81ac,bg=#434c5e]▐#[bg=#5e81ac,fg=#eceff4,bold] %a %d-%b "
set -g status-right-length 60

# Inactive: generous wide spacing
set -g window-status-format "#[fg=#d8dee9]   #I #W#{?window_flags, #{window_flags},}   "
set -g window-status-separator ""

# Active: left-cap only (leading arrow, NO trailing arrow)
set -g window-status-current-format "#[fg=#88c0d0,bg=#3b4252]▌#[bg=#88c0d0,fg=#2e3440,bold] #I #W#{?window_flags, #{window_flags},} #[bg=#3b4252] "

set -g window-status-activity-style "fg=#ebcb8b,bg=#3b4252"
set -g pane-active-border-style "fg=#88c0d0"
set -g pane-border-style "fg=#434c5e"
set -g message-style "bg=#434c5e,fg=#d8dee9"
set -g message-command-style "bg=#434c5e,fg=#d8dee9"
set -g mode-style "bg=#81a1c1,fg=#2e3440"