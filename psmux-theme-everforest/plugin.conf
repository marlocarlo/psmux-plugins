# =============================================================================
# psmux-theme-everforest - Everforest color theme for psmux
# Static .conf version (source-file compatible)
# Style: clean blocks (standard Unicode, no special fonts required)
# Variant: dark-medium
# =============================================================================
#
# Everforest dark-medium palette:
#   bg0=#2d353b bg1=#343f44 bg2=#3d484d bg3=#475258 bg4=#4f585e bg5=#56635f
#   fg=#d3c6aa orange=#e69875 red=#e67e80 yellow=#dbbc7f green=#a7c080
#   aqua=#83c092 blue=#7fbbb3 purple=#d699b6 gray0=#7a8478 gray1=#859289
#   gray2=#9da9a0

# --- Status bar ---
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#2d353b,fg=#d3c6aa"

# Status left: session name + user segment
set -g status-left "#[bg=#a7c080,fg=#2d353b,bold] #S #[bg=#343f44,fg=#9da9a0] #{user} #[bg=#2d353b,fg=#d3c6aa] "
set -g status-left-length 45

# Status right: prefix indicator + time + day + date
set -g status-right "#{?client_prefix,#[bg=#e67e80,fg=#2d353b,bold] PREF #[bg=#2d353b] ,}#[bg=#3d484d,fg=#7fbbb3] %H:%M #[bg=#475258,fg=#dbbc7f] %a #[bg=#a7c080,fg=#2d353b,bold] %d-%b "
set -g status-right-length 80

# Window status (inactive)
set -g window-status-format "#[bg=#343f44,fg=#7a8478] #I #W#{?window_flags, #{window_flags},} "

# Window status (current/active) - aqua highlight
set -g window-status-current-format "#[bg=#83c092,fg=#2d353b,bold] #I #W#{?window_flags, #{window_flags},} "

# Activity
set -g window-status-activity-style "fg=#e69875,bg=#2d353b"

# Pane borders
set -g pane-active-border-style "fg=#a7c080"
set -g pane-border-style "fg=#343f44"

# Messages
set -g message-style "bg=#343f44,fg=#d3c6aa"
set -g message-command-style "bg=#343f44,fg=#d3c6aa"

# Copy mode
set -g mode-style "bg=#a7c080,fg=#2d353b"