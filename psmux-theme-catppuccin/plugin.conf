# =============================================================================
# psmux-theme-catppuccin - Catppuccin color theme for psmux
# Static .conf version (source-file compatible)
# Style: clean blocks (standard Unicode, no special fonts required)
# Flavor: mocha
# =============================================================================
#
# Catppuccin Mocha palette:
#   base=#1e1e2e mantle=#181825 crust=#11111b
#   text=#cdd6f4 subtext0=#a6adc8 subtext1=#bac2de
#   surface0=#313244 surface1=#45475a surface2=#585b70
#   overlay0=#6c7086 overlay1=#7f849c overlay2=#9399b2
#   blue=#89b4fa lavender=#b4befe green=#a6e3a1
#   teal=#94e2d5 sky=#89dceb sapphire=#74c7ec
#   mauve=#cba6f7 pink=#f5c2e7 flamingo=#f2cdcd rosewater=#f5e0dc
#   peach=#fab387 yellow=#f9e2af red=#f38ba8 maroon=#eba0ac

# --- Status bar ---
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Status left: session name + user segment
set -g status-left "#[bg=#89b4fa,fg=#11111b,bold] #S #[bg=#313244,fg=#a6adc8] #{user} #[bg=#1e1e2e,fg=#cdd6f4] "
set -g status-left-length 45

# Status right: prefix indicator + time + day + date
set -g status-right "#{?client_prefix,#[bg=#fab387,fg=#11111b,bold] PREF #[bg=#1e1e2e] ,}#[bg=#45475a,fg=#89dceb] %H:%M #[bg=#585b70,fg=#f9e2af] %a #[bg=#cba6f7,fg=#11111b,bold] %d-%b "
set -g status-right-length 80

# Window status (inactive)
set -g window-status-format "#[bg=#313244,fg=#a6adc8] #I #W#{?window_flags, #{window_flags},} "

# Window status (current/active) - green highlight
set -g window-status-current-format "#[bg=#a6e3a1,fg=#11111b,bold] #I #W#{?window_flags, #{window_flags},} "

# Activity
set -g window-status-activity-style "fg=#fab387,bg=#1e1e2e"

# Pane borders
set -g pane-active-border-style "fg=#89b4fa"
set -g pane-border-style "fg=#313244"

# Messages
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g message-command-style "bg=#313244,fg=#cdd6f4"

# Copy mode
set -g mode-style "bg=#89b4fa,fg=#11111b"